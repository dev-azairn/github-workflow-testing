name: Godot Test and Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Godot 4.7
        uses: firebelley/setup-godot@v2
        with:
          godot-version: "4.7.0"
          use-dotnet: false

      - name: Run all tests
        run: godot --headless --verbose --test

  build:
    runs-on: ubuntu-latest
    needs: test
    if: success()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Godot 4.7
        uses: firebelley/setup-godot@v2
        with:
          godot-version: "4.7.0"
          use-dotnet: false

      - name: Export project
        run: |
          mkdir -p build/linux
          godot --headless --export-release "Linux/X11" build/linux/game.x86_64