name: Godot GUT Test and Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: "4.7.0"
          use-dotnet: false
          include-templates: true

      - name: Run GUT tests
        run: godot --headless -s addons/gut/gut_cmdln.gd -gdir=res://tests

  build:
    runs-on: ubuntu-latest
    needs: test
    if: success()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: "4.7.0"
          use-dotnet: false
          include-templates: true

      - name: Export project
        run: |
          mkdir -p build/linux
          godot --headless --export-release "Linux" build/linux/game.x86_64
