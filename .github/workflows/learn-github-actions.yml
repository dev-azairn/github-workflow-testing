name: Godot Engine Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Godot Engine source
        run: |
          git clone https://github.com/godotengine/godot.git
          cd godot
          git checkout 4.7-stable

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential scons pkg-config \
            libx11-dev libxcursor-dev libxrandr-dev libxi-dev \
            libasound2-dev libpulse-dev libudev-dev libgl1-mesa-dev \
            libglu-dev zlib1g-dev

      - name: Build Godot with tests enabled
        run: |
          cd godot
          scons platform=linuxbsd tests=yes -j$(nproc)

      - name: Run unit tests
        run: |
          cd godot
          ./bin/godot.linuxbsd.tools.64 --headless --test
