name: Auto Create Branch
on:
  issues:
    types: [opened]

jobs:
  create-branch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: art-team # ระบุให้ดึง branch art-team มาเป็นฐาน

      - name: Create and Link Branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH_NAME="feature/issue-${{ github.event.issue.number }}"
          
          # สร้าง branch ใหม่โดยอ้างอิงจาก art-team
          git checkout -b $BRANCH_NAME
          git push origin $BRANCH_NAME
          
          # สร้าง PR ร่างเพื่อเชื่อมโยงกับ Issue และ Development Section
          gh pr create \
            --title "Work for #${{ github.event.issue.number }}" \
            --body "Closes #${{ github.event.issue.number }}" \
            --head $BRANCH_NAME \
            --base art-team
