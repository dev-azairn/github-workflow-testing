name: Auto Create Branch for Art Issues
on:
  issues:
    types: [opened, labeled]

concurrency:
  group: create-branch-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  create-branch:
    if: contains(github.event.issue.labels.*.name, 'art')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout art-team branch
        uses: actions/checkout@v4
        with:
          ref: art-team
          fetch-depth: 0

      - name: Check if branch already exists (exact match)
        id: check_branch
        run: |
          BRANCH_NAME="feature/issue-${{ github.event.issue.number }}"
          echo "branch_name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"

          MATCH=$(git ls-remote --heads origin "refs/heads/$BRANCH_NAME")
          if [ -n "$MATCH" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push branch
        if: steps.check_branch.outputs.exists == 'false'
        run: |
          BRANCH_NAME="${{ steps.check_branch.outputs.branch_name }}"
          git checkout -b "$BRANCH_NAME"

          # Empty commit so the branch has a diff vs art-team,
          # otherwise "gh pr create" fails with "No commits between..."
          git commit --allow-empty -m "chore: initialize branch for issue #${{ github.event.issue.number }}"

          git push origin "$BRANCH_NAME"

      - name: Check if PR already exists
        id: check_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH_NAME="${{ steps.check_branch.outputs.branch_name }}"
          PR_EXISTS=$(gh pr list --head "$BRANCH_NAME" --base art-team --json number --jq 'length')
          if [ "$PR_EXISTS" -gt 0 ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Draft PR linked to Issue
        if: steps.check_pr.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH_NAME="${{ steps.check_branch.outputs.branch_name }}"
          gh pr create \
            --draft \
            --title "[Art] Work for #${{ github.event.issue.number }} - ${{ github.event.issue.title }}" \
            --body "Closes #${{ github.event.issue.number }}

            Auto-created branch \`$BRANCH_NAME\` from \`art-team\` for this issue." \
            --head "$BRANCH_NAME" \
            --base art-team

      - name: Comment on Issue with branch link
        if: steps.check_branch.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH_NAME="${{ steps.check_branch.outputs.branch_name }}"
          gh issue comment ${{ github.event.issue.number }} \
            --body "🌿 Branch \`$BRANCH_NAME\` has been created from \`art-team\` and linked via a draft PR."
